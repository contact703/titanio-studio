<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titanio Dashboard — Model Switcher Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }
    .glow {
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
    }
    .pulse-active {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body class="bg-slate-900 text-white p-8">
  <div class="max-w-4xl mx-auto">
    
    <!-- Header -->
    <header class="mb-12">
      <h1 class="text-4xl font-bold mb-2">
        🐾 Titanio Dashboard
        <span class="text-sm text-gray-400 block mt-2">Real Model Switching Test</span>
      </h1>
      <p class="text-gray-400">Backend: <code class="bg-slate-800 px-2 py-1 rounded text-cyan-400">http://localhost:4444</code></p>
    </header>

    <!-- Current Model Display -->
    <div class="bg-slate-800 border border-cyan-500/50 rounded-lg p-6 mb-8">
      <p class="text-gray-400 text-sm mb-2">Currently Using:</p>
      <div class="text-3xl font-bold font-mono text-cyan-400" data-model-display>
        Loading...
      </div>
      <p class="text-gray-500 text-xs mt-2">Updates in real-time from backend</p>
    </div>

    <!-- Model Selector -->
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 mb-8">
      <h2 class="text-lg font-semibold mb-4">Switch Model:</h2>
      
      <!-- Buttons -->
      <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
        <button 
          data-model-switch="opus"
          class="px-4 py-3 rounded border border-slate-600 hover:bg-white/5 transition-all font-mono text-sm"
        >
          🚀 Opus (Best)
        </button>
        <button 
          data-model-switch="sonnet"
          class="px-4 py-3 rounded border border-slate-600 hover:bg-white/5 transition-all font-mono text-sm"
        >
          ⚡ Sonnet (Fast)
        </button>
        <button 
          data-model-switch="haiku"
          class="px-4 py-3 rounded border border-slate-600 hover:bg-white/5 transition-all font-mono text-sm"
        >
          🎯 Haiku (Quick)
        </button>
        <button 
          data-model-switch="kimi"
          class="px-4 py-3 rounded border border-slate-600 hover:bg-white/5 transition-all font-mono text-sm"
        >
          🌙 Kimi (CN)
        </button>
        <button 
          data-model-switch="nemotron"
          class="px-4 py-3 rounded border border-slate-600 hover:bg-white/5 transition-all font-mono text-sm"
        >
          💪 Nemotron (Free)
        </button>
        <button 
          data-model-switch="stepflash"
          class="px-4 py-3 rounded border border-slate-600 hover:bg-white/5 transition-all font-mono text-sm"
        >
          ✨ StepFlash (Free)
        </button>
      </div>

      <!-- Or Dropdown -->
      <div class="mb-4">
        <label class="text-sm text-gray-400 block mb-2">Or use dropdown:</label>
        <select id="model-select" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white">
          <option value="">Select model...</option>
          <option value="opus">Opus (anthropic/claude-opus-4-6)</option>
          <option value="sonnet">Sonnet (anthropic/claude-sonnet-4-5)</option>
          <option value="haiku">Haiku (anthropic/claude-haiku-4-5-20251001)</option>
          <option value="kimi">Kimi (moonshot/kimi-k2-turbo-preview)</option>
          <option value="nemotron">Nemotron (openrouter/nvidia/nemotron-3-super-120b:free)</option>
          <option value="stepflash">StepFlash (openrouter/stepfun/step-3.5-flash:free)</option>
        </select>
      </div>
    </div>

    <!-- Full Model ID -->
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 mb-8">
      <p class="text-gray-400 text-sm mb-2">Full Model ID:</p>
      <code class="block bg-slate-900 border border-slate-700 rounded p-3 font-mono text-xs text-gray-300 overflow-auto" data-model-display>
        Loading...
      </code>
    </div>

    <!-- API Test -->
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 mb-8">
      <h2 class="text-lg font-semibold mb-4">API Test:</h2>
      <div class="space-y-4">
        <button 
          onclick="testGetModel()"
          class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded transition-all"
        >
          GET /api/openclaw/model
        </button>
        <button 
          onclick="testListModels()"
          class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded transition-all"
        >
          GET /api/openclaw/models
        </button>
        <div id="api-result" class="bg-slate-900 border border-slate-700 rounded p-3 text-xs text-gray-400 min-h-20 overflow-auto font-mono hidden">
          (API response will appear here)
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="bg-slate-800 border border-emerald-500/30 rounded-lg p-6">
      <div class="flex items-center gap-2 mb-4">
        <div id="status-indicator" class="w-3 h-3 rounded-full bg-red-500"></div>
        <span id="status-text">Checking...</span>
      </div>
      <div id="status-details" class="text-sm text-gray-400 space-y-1"></div>
    </div>

  </div>

  <!-- Include the model switcher -->
  <script src="dashboard-model-switcher.js"></script>
  
  <!-- Test functions -->
  <script>
    async function testGetModel() {
      const resultEl = document.getElementById('api-result');
      resultEl.classList.remove('hidden');
      resultEl.textContent = 'Loading...';

      try {
        const response = await fetch('http://localhost:4444/api/openclaw/model');
        const data = await response.json();
        resultEl.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        resultEl.textContent = `Error: ${error.message}`;
      }
    }

    async function testListModels() {
      const resultEl = document.getElementById('api-result');
      resultEl.classList.remove('hidden');
      resultEl.textContent = 'Loading...';

      try {
        const response = await fetch('http://localhost:4444/api/openclaw/models');
        const data = await response.json();
        resultEl.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        resultEl.textContent = `Error: ${error.message}`;
      }
    }

    // Update status
    async function updateStatus() {
      const statusEl = document.getElementById('status-text');
      const indicatorEl = document.getElementById('status-indicator');
      const detailsEl = document.getElementById('status-details');

      try {
        const response = await fetch('http://localhost:4444/health');
        const data = await response.json();
        
        if (data.status === 'ok') {
          statusEl.textContent = '✅ Backend is running';
          indicatorEl.className = 'w-3 h-3 rounded-full bg-emerald-500 pulse-active';
          detailsEl.innerHTML = `
            <div>Model: <strong data-model-display>Loading...</strong></div>
            <div>Backend port: 4444</div>
            <div>Status: Operational</div>
          `;
        } else {
          throw new Error('Unexpected status');
        }
      } catch (error) {
        statusEl.textContent = '❌ Backend not responding';
        indicatorEl.className = 'w-3 h-3 rounded-full bg-red-500';
        detailsEl.innerHTML = `<div>Error: ${error.message}</div>`;
      }
    }

    updateStatus();
    setInterval(updateStatus, 5000);

    // Log to console for debugging
    console.log('🐾 Titanio Dashboard ready');
    console.log('Available methods:');
    console.log('  - window.titanio.switchModel(model)');
    console.log('  - window.titanio.getCurrentModel()');
    console.log('  - window.titanio.getAliases()');
  </script>

</body>
</html>
